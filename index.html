<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf Combat Tech Team — Texas Robot Combat</title>
<meta name="description" content="Wolf Combat Tech Team is a student-built engineering team designing, building, and competing with combat robots in Texas Robot Combat events." />
<meta name="theme-color" content="#14171A" />

<!-- Open Graph -->
<meta property="og:title" content="Wolf Combat Tech Team" />
<meta property="og:description" content="Student-built combat robots. Designed, machined, and fought in the arenas of Texas Robot Combat." />
<meta property="og:type" content="website" />

<!--
  NOTE: <title> and the meta tags above are duplicated from data.js so
  crawlers that don't run JS still see correct text. If you edit the
  copy in data.js, update these two spots to match.
-->

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%2314171A'/%3E%3Cpath d='M50 12 L88 50 L50 88 L12 50 Z' fill='none' stroke='%23FF6A13' stroke-width='5'/%3E%3Ctext x='50' y='62' font-family='Arial,sans-serif' font-weight='800' font-size='38' fill='%23EDEAE2' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<!-- Scroll progress gauge -->
<div class="progress-bar" aria-hidden="true"><div class="progress-bar__fill" id="progressFill"></div></div>

<!-- ============ NAV (rendered by script.js from SITE_DATA.nav) ============ -->
<header class="nav" id="nav">
  <div class="nav__inner wrap">
    <a class="brand" href="#top" aria-label="Wolf Combat Tech Team — home">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 8 L92 50 L50 92 L8 50 Z"/><text x="50" y="63">W</text></svg>
      </span>
      <span class="brand__text" id="brandText"></span>
    </a>

    <nav class="nav__links" id="navLinks" aria-label="Primary"></nav>

    <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navMobile" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="nav__mobile" id="navMobile"></div>
</header>

<main id="main">

  <!-- ============ HERO ============ -->
  <section class="hero" id="top">
    <div class="hazard-strip hazard-strip--top" aria-hidden="true"></div>
    <div class="wrap hero__inner" id="heroContent"></div>
    <div class="hazard-strip hazard-strip--bottom" aria-hidden="true"></div>
  </section>

  <!-- ============ ABOUT ============ -->
  <section class="section" id="about">
    <div class="wrap" id="aboutContent"></div>
  </section>

  <!-- ============ DIVISIONS ============ -->
  <section class="section section--dark" id="divisions">
    <div class="wrap" id="divisionsContent"></div>
  </section>

  <!-- ============ PROCESS ============ -->
  <section class="section" id="process">
    <div class="wrap" id="processContent"></div>
  </section>

  <!-- ============ MISSION ============ -->
  <section class="section section--dark" id="mission">
    <div class="wrap mission" id="missionContent"></div>
  </section>

  <!-- ============ JOIN ============ -->
  <section class="section join" id="join">
    <div class="hazard-strip hazard-strip--top" aria-hidden="true"></div>
    <div class="wrap join__inner" id="joinContent"></div>
    <div class="hazard-strip hazard-strip--bottom" aria-hidden="true"></div>
  </section>

</main>

<!-- ============ FOOTER ============ -->
<footer class="footer">
  <div class="wrap footer__inner">
    <div class="brand brand--footer">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 8 L92 50 L50 92 L8 50 Z"/><text x="50" y="63">W</text></svg>
      </span>
      <span class="brand__text" id="footerBrand"></span>
    </div>
    <p class="footer__meta mono" id="footerMeta"></p>
  </div>
</footer>

<!-- data.js MUST load before script.js -->
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
